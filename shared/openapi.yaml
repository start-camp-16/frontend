openapi: 3.1.0
info:
  title: 뭐할구 API
  version: 1.0.0
  description: |
    서울 구별·카테고리별 장소 랭킹, 익명 게시판·댓글, 근거 기반 챗봇을 위한 공유 API 계약입니다.
    장소 랭킹은 별도 점수 없이 JSON 원본 순서(source_order ASC)를 사용합니다.
servers:
  - url: http://localhost:8000
    description: 로컬 개발 서버
tags:
  - name: Meta
  - name: Rankings
  - name: Posts
  - name: Comments
  - name: Chat
  - name: Health
paths:
  /api/meta/categories:
    get:
      tags: [Meta]
      summary: 장소 카테고리 목록 조회
      operationId: getCategories
      responses:
        '200':
          description: 카테고리 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoriesResponse'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/meta/districts:
    get:
      tags: [Meta]
      summary: 서울 구 목록 조회
      operationId: getDistricts
      responses:
        '200':
          description: 장소 데이터에 존재하는 구 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DistrictsResponse'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/rankings:
    get:
      tags: [Rankings]
      summary: 구·카테고리별 장소 랭킹 조회
      description: 필터링된 장소를 source_order 오름차순으로 반환합니다.
      operationId: getRankings
      parameters:
        - $ref: '#/components/parameters/DistrictQuery'
        - $ref: '#/components/parameters/CategoryQueryRequired'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/SizeQuery'
      responses:
        '200':
          description: 장소 랭킹
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RankingListResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/posts:
    get:
      tags: [Posts]
      summary: 게시글 목록·검색
      operationId: getPosts
      parameters:
        - name: district
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/PostDistrict'
        - name: prefix
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/PostPrefix'
        - name: q
          in: query
          required: false
          description: 제목 또는 본문 부분 일치 검색어
          schema:
            type: string
            maxLength: 100
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/SizeQuery'
      responses:
        '200':
          description: 게시글 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostListResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Posts]
      summary: 게시글 작성
      operationId: createPost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostCreateRequest'
      responses:
        '201':
          description: 작성된 게시글
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/posts/{post_id}:
    parameters:
      - $ref: '#/components/parameters/PostIdPath'
    get:
      tags: [Posts]
      summary: 게시글 상세 조회
      operationId: getPost
      responses:
        '200':
          description: 게시글 상세
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostDetail'
        '404':
          $ref: '#/components/responses/PostNotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      tags: [Posts]
      summary: 게시글 수정
      operationId: updatePost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostUpdateRequest'
      responses:
        '200':
          description: 수정된 게시글
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/PasswordMismatch'
        '404':
          $ref: '#/components/responses/PostNotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags: [Posts]
      summary: 게시글 삭제
      description: 게시글 삭제 시 소속 댓글도 함께 삭제됩니다.
      operationId: deletePost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordRequest'
      responses:
        '204':
          description: 삭제 성공
        '403':
          $ref: '#/components/responses/PasswordMismatch'
        '404':
          $ref: '#/components/responses/PostNotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/posts/{post_id}/comments:
    parameters:
      - $ref: '#/components/parameters/PostIdPath'
    get:
      tags: [Comments]
      summary: 게시글 댓글 목록 조회
      operationId: getComments
      responses:
        '200':
          description: 작성일 오름차순 댓글 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentListResponse'
        '404':
          $ref: '#/components/responses/PostNotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Comments]
      summary: 댓글 작성
      operationId: createComment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentCreateRequest'
      responses:
        '201':
          description: 작성된 댓글
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/PostNotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/comments/{comment_id}:
    parameters:
      - $ref: '#/components/parameters/CommentIdPath'
    put:
      tags: [Comments]
      summary: 댓글 수정
      operationId: updateComment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentUpdateRequest'
      responses:
        '200':
          description: 수정된 댓글
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/PasswordMismatch'
        '404':
          $ref: '#/components/responses/CommentNotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags: [Comments]
      summary: 댓글 삭제
      operationId: deleteComment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordRequest'
      responses:
        '204':
          description: 삭제 성공
        '403':
          $ref: '#/components/responses/PasswordMismatch'
        '404':
          $ref: '#/components/responses/CommentNotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/chat:
    post:
      tags: [Chat]
      summary: 서울 지역 정보 챗봇 질의
      description: 장소와 게시글 검색 결과를 근거로 OpenAI 답변을 생성합니다.
      operationId: chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: 챗봇 답변과 근거
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/ChatRateLimited'
        '502':
          $ref: '#/components/responses/ChatProviderError'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/health:
    get:
      tags: [Health]
      summary: 서비스 상태 확인
      operationId: health
      responses:
        '200':
          description: 정상 상태
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '500':
          $ref: '#/components/responses/InternalError'
components:
  parameters:
    DistrictQuery:
      name: district
      in: query
      required: true
      schema:
        type: string
        minLength: 1
      example: 강남구
    CategoryQueryRequired:
      name: category
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/LocationCategory'
    PageQuery:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    SizeQuery:
      name: size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    PostIdPath:
      name: post_id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    CommentIdPath:
      name: comment_id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
  responses:
    ValidationError:
      description: 입력값 오류
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: VALIDATION_ERROR
            message: 입력값을 확인해 주세요.
            details: null
    PasswordMismatch:
      description: 비밀번호 불일치
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: PASSWORD_MISMATCH
            message: 비밀번호가 일치하지 않습니다.
            details: null
    PostNotFound:
      description: 게시글 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: POST_NOT_FOUND
            message: 게시글을 찾을 수 없습니다.
            details: null
    CommentNotFound:
      description: 댓글 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: COMMENT_NOT_FOUND
            message: 댓글을 찾을 수 없습니다.
            details: null
    ChatRateLimited:
      description: 챗봇 호출 제한
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: CHAT_RATE_LIMITED
            message: 요청이 많습니다. 잠시 후 다시 시도해 주세요.
            details: null
    ChatProviderError:
      description: 외부 챗봇 제공자 오류
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: CHAT_PROVIDER_ERROR
            message: 챗봇 서비스에 연결할 수 없습니다.
            details: null
    InternalError:
      description: 서버 내부 오류
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: INTERNAL_ERROR
            message: 서버 오류가 발생했습니다.
            details: null
  schemas:
    LocationCategory:
      type: string
      enum: [관광지, 레포츠, 문화시설, 쇼핑, 숙박, 여행코스, 축제공연행사]
    PostDistrict:
      type: string
      enum: [강남구, 강동구, 강북구, 강서구, 관악구, 광진구, 구로구, 금천구, 노원구, 도봉구, 동대문구, 동작구, 마포구, 서대문구, 서초구, 성동구, 성북구, 송파구, 양천구, 영등포구, 용산구, 은평구, 종로구, 중구, 중랑구]
    PostPrefix:
      type: string
      enum: [관광, 맛집, 문화, 행사, 숙박, 쇼핑, 자유]
    CategoriesResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/LocationCategory'
      example:
        items: [관광지, 레포츠, 문화시설, 쇼핑, 숙박, 여행코스, 축제공연행사]
    DistrictsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            type: string
      example:
        items: [강남구, 강동구, 강북구, 기타]
    Pagination:
      type: object
      required: [page, size, total_items, total_pages]
      properties:
        page:
          type: integer
          minimum: 1
        size:
          type: integer
          minimum: 1
        total_items:
          type: integer
          minimum: 0
        total_pages:
          type: integer
          minimum: 0
    RankingItem:
      type: object
      required: [rank, content_id, category, title, district, source_order]
      properties:
        rank:
          type: integer
          minimum: 1
        content_id:
          type: string
        category:
          $ref: '#/components/schemas/LocationCategory'
        title:
          type: string
        address:
          type: [string, 'null']
        district:
          type: string
        longitude:
          type: [number, 'null']
        latitude:
          type: [number, 'null']
        image_url:
          type: [string, 'null']
          format: uri
        thumbnail_url:
          type: [string, 'null']
          format: uri
        phone:
          type: [string, 'null']
        source_order:
          type: integer
          minimum: 1
    RankingListResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RankingItem'
        pagination:
          $ref: '#/components/schemas/Pagination'
    PostSummary:
      type: object
      required: [id, district, prefix, title, created_at, updated_at]
      properties:
        id:
          type: integer
        district:
          $ref: '#/components/schemas/PostDistrict'
        prefix:
          $ref: '#/components/schemas/PostPrefix'
        title:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    PostDetail:
      allOf:
        - $ref: '#/components/schemas/PostSummary'
        - type: object
          required: [content]
          properties:
            content:
              type: string
    PostListResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PostSummary'
        pagination:
          $ref: '#/components/schemas/Pagination'
    PostCreateRequest:
      type: object
      additionalProperties: false
      required: [district, prefix, title, content, password]
      properties:
        district:
          $ref: '#/components/schemas/PostDistrict'
        prefix:
          $ref: '#/components/schemas/PostPrefix'
        title:
          type: string
          minLength: 1
          maxLength: 100
        content:
          type: string
          minLength: 1
          maxLength: 5000
        password:
          type: string
          minLength: 4
          maxLength: 20
          writeOnly: true
    PostUpdateRequest:
      type: object
      additionalProperties: false
      required: [password, district, prefix, title, content]
      properties:
        password:
          type: string
          minLength: 4
          maxLength: 20
          writeOnly: true
        district:
          $ref: '#/components/schemas/PostDistrict'
        prefix:
          $ref: '#/components/schemas/PostPrefix'
        title:
          type: string
          minLength: 1
          maxLength: 100
        content:
          type: string
          minLength: 1
          maxLength: 5000
    PasswordRequest:
      type: object
      additionalProperties: false
      required: [password]
      properties:
        password:
          type: string
          minLength: 4
          maxLength: 20
          writeOnly: true
    Comment:
      type: object
      required: [id, post_id, content, created_at, updated_at]
      properties:
        id:
          type: integer
        post_id:
          type: integer
        content:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CommentListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Comment'
    CommentCreateRequest:
      type: object
      additionalProperties: false
      required: [content, password]
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 1000
        password:
          type: string
          minLength: 4
          maxLength: 20
          writeOnly: true
    CommentUpdateRequest:
      type: object
      additionalProperties: false
      required: [password, content]
      properties:
        password:
          type: string
          minLength: 4
          maxLength: 20
          writeOnly: true
        content:
          type: string
          minLength: 1
          maxLength: 1000
    ChatMessage:
      type: object
      additionalProperties: false
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
          minLength: 1
          maxLength: 2000
    ChatRequest:
      type: object
      additionalProperties: false
      required: [message]
      properties:
        message:
          type: string
          minLength: 1
          maxLength: 1000
        history:
          type: array
          maxItems: 10
          default: []
          items:
            $ref: '#/components/schemas/ChatMessage'
    LocationSource:
      type: object
      required: [type, content_id, title, category, district]
      properties:
        type:
          const: location
        content_id:
          type: string
        title:
          type: string
        category:
          $ref: '#/components/schemas/LocationCategory'
        district:
          type: string
        address:
          type: [string, 'null']
    PostSource:
      type: object
      required: [type, post_id, title, district, prefix]
      properties:
        type:
          const: post
        post_id:
          type: integer
        title:
          type: string
        district:
          $ref: '#/components/schemas/PostDistrict'
        prefix:
          $ref: '#/components/schemas/PostPrefix'
    ChatSource:
      oneOf:
        - $ref: '#/components/schemas/LocationSource'
        - $ref: '#/components/schemas/PostSource'
      discriminator:
        propertyName: type
    ChatResponse:
      type: object
      required: [answer, sources]
      properties:
        answer:
          type: string
        sources:
          type: array
          items:
            $ref: '#/components/schemas/ChatSource'
    HealthResponse:
      type: object
      required: [status, database]
      properties:
        status:
          type: string
          const: ok
        database:
          type: string
          const: ok
    ErrorResponse:
      type: object
      required: [code, message, details]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: [object, array, string, 'null']
